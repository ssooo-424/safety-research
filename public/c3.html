<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>미래와의 대화 (C3)</title>
  <style>
    body {
      margin: 0; padding: 0; background-color: #e9ecef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex; justify-content: center; height: 100vh; overflow: hidden;
    }
    
    /* ✅ 480px에서 900px로 넓이 변경 */
    .mobile-frame {
      width: 100%; max-width: 900px; background: #f2f4f7;
      display: flex; flex-direction: column; position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    
    header {
      background: #fff; padding: 16px; text-align: center; font-weight: bold;
      font-size: 1.1rem; border-bottom: 1px solid #ddd; flex-shrink: 0; z-index: 10;
    }
    #chat-box {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }
    
    /* ✅ 화면이 넓어졌으므로 말풍선이 너무 늘어나지 않도록 최대 너비를 조절 */
    .bubble {
      max-width: 70%; padding: 14px 18px; border-radius: 18px;
      font-size: 1rem; line-height: 1.5; word-wrap: break-word;
      animation: fadeIn 0.3s ease-out;
    }
    .bubble.bot { background: #fff; border: 1px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }
    .bubble.user { background: #ffeb3b; color: #333; align-self: flex-end; border-bottom-right-radius: 4px; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ✅ 추천 답변(Quick Replies) 스타일 */
    .quick-replies-container {
      background: #fff;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid #ddd;
    }
    .quick-reply-btn {
      background: #f8f9fa;
      border: 1px solid #ccc;
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 1rem;
      color: #333;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s;
    }
    .quick-reply-btn:hover { background: #e2e6ea; }
    .quick-reply-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 🚨 텍스트 입력창 스타일 */
    .chat-input-container {
      display: none; /* 처음엔 숨김 */
      background: #fff;
      padding: 16px 20px;
      flex-direction: row;
      gap: 10px;
      border-top: 1px solid #ddd;
    }
    #chat-input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 1rem;
      outline: none;
    }
    #chat-input::placeholder {
      color: #adb5bd; /* 연한 회색 */
    }
    #send-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 0 24px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #send-btn:hover { background: #555; }

    /* 로딩 인디케이터 */
    .typing-indicator {
      display: none; align-self: flex-start;
      background: #fff; border: 1px solid #e0e0e0; padding: 12px 16px;
      border-radius: 18px; border-bottom-left-radius: 4px; margin-bottom: 12px;
    }
    .typing-indicator span {
      display: inline-block; width: 6px; height: 6px;
      background: #999; border-radius: 50%; margin: 0 2px;
      animation: typing 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <div class="mobile-frame">
    <header>미래의 나와 대화중...</header>
    
    <div id="chat-box"></div>
    
    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>

    <div class="quick-replies-container" id="quick-replies-box"></div>

    <div class="chat-input-container" id="chat-input-container">
      <input type="text" id="chat-input" autocomplete="off" />
      <button id="send-btn">보내기</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const typingEl = document.getElementById("typing");
    const quickRepliesBox = document.getElementById("quick-replies-box");
    
    const chatInputContainer = document.getElementById("chat-input-container");
    const chatInput = document.getElementById("chat-input");
    const sendBtn = document.getElementById("send-btn");

    const TARGET_PHRASE = "무너진 안전은 되돌릴 수 없지만, 지켜낸 안전은 미래를 만듭니다.";

    let payload = null;
    let scenarioId = null;
    let messages = [];

    let branch = localStorage.getItem("branchChoice") || new URLSearchParams(window.location.search).get("branch") || "Stop";

    function appendBubble(text, sender) {
      const div = document.createElement("div");
      div.className = `bubble ${sender}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showLoading() {
      typingEl.style.display = "block";
      chatBox.appendChild(typingEl);
      chatBox.scrollTop = chatBox.scrollHeight;
      quickRepliesBox.innerHTML = "";
    }

    function hideLoading() {
      typingEl.style.display = "none";
    }

    async function requestBotReply() {
      showLoading(); // 처음 서버 요청할 때 로딩 표시
      
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ payload, scenarioId, branch, messages })
        });
        const data = await res.json();
        hideLoading(); // 서버 응답이 오면 일단 로딩 숨김

        if (!data.ok) throw new Error(data.error || "서버 통신 오류");

        const rawText = data.assistant || data.text || data.reply || "";
        if (!rawText) throw new Error("서버에서 빈 응답이 왔습니다.");

        const cleanText = String(rawText).replace(/```json/gi, "").replace(/```/g, "").trim();
        
        let parsedReply;
        try {
          parsedReply = JSON.parse(cleanText);
        } catch (parseError) {
          console.error("🚨 JSON 파싱 에러 발생! 원본 데이터:", rawText);
          throw new Error("AI가 올바르지 않은 형식으로 대답했습니다.");
        }
        
        const botText = parsedReply.botMessage;
        const quickReplies = parsedReply.quickReplies || [];

        // 말풍선 분리 및 글자 수 비례 타이핑 효과 적용
        const parts = botText.split("|||");
        for (const part of parts) {
          const text = part.trim();
          if (text) {
            showLoading(); // 실제 말풍선이 나오기 전에 타이핑 인디케이터 켜기
            
            // 💡 글자 수 1개당 40ms 딜레이 부여 (최소 0.6초, 최대 2.5초 제한)
            const typingDelay = Math.min(2500, Math.max(600, text.length * 40));
            
            await new Promise(r => setTimeout(r, typingDelay));
            
            hideLoading(); // 딜레이 후 인디케이터 끄고
            appendBubble(text, "bot"); // 실제 텍스트 말풍선 붙이기
          }
        }

        messages.push({ role: "assistant", text: botText });
        renderQuickReplies(quickReplies);

      } catch (e) {
        hideLoading();
        console.error("에러 발생:", e);
        appendBubble(`⚠️ 통신 오류: ${e.message}`, "bot");
      }
    }

    function renderQuickReplies(replies) {
      quickRepliesBox.innerHTML = ""; 
      
      if (!replies || replies.length === 0) {
        quickRepliesBox.style.display = "none";
        chatInputContainer.style.display = "flex";
        chatInput.placeholder = TARGET_PHRASE;
        chatInput.focus();
        return;
      }

      quickRepliesBox.style.display = "flex";
      chatInputContainer.style.display = "none";

      replies.forEach(replyText => {
        const btn = document.createElement("button");
        btn.className = "quick-reply-btn";
        btn.textContent = replyText;
        btn.onclick = () => handleUserSelection(replyText);
        quickRepliesBox.appendChild(btn);
      });
    }

    function handleUserSelection(text) {
      appendBubble(text, "user");
      messages.push({ role: "user", text: text });
      requestBotReply();
    }

    function handleFinalSubmit() {
      const userText = chatInput.value.trim();
      if (!userText) return;

      const cleanUserText = userText.replace(/\s+/g, "");
      const cleanTargetText = TARGET_PHRASE.replace(/\s+/g, "");

      if (cleanUserText === cleanTargetText) {
        appendBubble(userText, "user");
        chatInputContainer.style.display = "none";

        setTimeout(() => {
          appendBubble("수고하셨습니다. 모든 시뮬레이션 대화가 안전하게 종료되었습니다.", "bot");
          
          setTimeout(() => {
            alert("시뮬레이션이 종료되었습니다.");
            // window.location.href = '/result'; 
          }, 500);
        }, 800);

      } else {
        alert("문구를 정확히 입력해주세요.\n\n" + TARGET_PHRASE);
      }
    }

    sendBtn.addEventListener("click", handleFinalSubmit);
    chatInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        handleFinalSubmit();
      }
    });

    async function init() {
      try {
        const res = await fetch("/api/last-survey");
        const json = await res.json();
        if (json.ok) {
          payload = json.record.data;
          scenarioId = json.record.scenarioId;
          requestBotReply();
        } else {
          appendBubble("데이터를 찾을 수 없습니다.", "bot");
        }
      } catch (e) {
        appendBubble("데이터를 불러오지 못했습니다.", "bot");
      }
    }

    init();
  </script>
</body>
</html>
