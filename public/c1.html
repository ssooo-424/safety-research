<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>사고 사례 분석 리포트 (C1)</title>
  <style>
    body {
      margin: 0; padding: 0; background-color: #e9ecef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex; justify-content: center; height: 100vh; overflow: hidden;
    }
    .mobile-frame {
      width: 100%; max-width: 900px; background: #f2f4f7;
      display: flex; flex-direction: column; position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    header {
      background: #fff; padding: 16px; text-align: center; font-weight: bold;
      font-size: 1.1rem; border-bottom: 1px solid #ddd; flex-shrink: 0; z-index: 10;
    }
    #content-box {
      flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px;
    }

    /* 로딩 애니메이션 */
    .loader-container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #666; font-size: 1.1rem; gap: 15px;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1);
      border-radius: 50%; border-top-color: #007bff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 리포트 스타일 */
    .report-section {
      background: #fff; border-radius: 12px; padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #d32f2f;
    }
    .report-section h3 { margin-top: 0; color: #d32f2f; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;}
    
    .rules-box {
      background: #eef2f5; border-radius: 12px; padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #007bff; margin-top: 20px;
    }
    .rules-box h3 { margin-top: 0; color: #0056b3; margin-bottom: 15px;}

    .report-image {
      width: 100%; max-width: 500px; border-radius: 8px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: block; margin-left: auto; margin-right: auto;
    }

    /* 하단 다음 단계 버튼 */
    .next-btn-container { padding: 16px 24px; background: #fff; border-top: 1px solid #ddd; text-align: right; }
    .next-btn {
      background: #333; color: #fff; border: none; padding: 14px 24px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s;
    }
    .next-btn:hover { background: #555; }
  </style>
</head>
<body>

  <div class="mobile-frame">
    <header>사고 사례 분석 리포트 (C1)</header>
    
    <div id="content-box">
      <div id="c1-warning-box" style="display: none; padding: 18px 20px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 1.05rem; line-height: 1.6; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);"></div>

      <div id="loader-container" class="loader-container">
        <div class="spinner"></div>
        <div>유사한 사고 사례 데이터를 수집 및 분석 중입니다...</div>
      </div>

      <div id="report-container" style="display: none;">
        <div class="report-section">
          <h3>📝 사고 개요 및 분석</h3>
          <div id="report-text" style="line-height: 1.6; color: #333;"></div>
          <div id="image-wrapper"></div>
        </div>
        
        <div id="rules-container"></div>
      </div>
    </div>

    <div class="next-btn-container" id="next-btn" style="display: none;">
      <button class="next-btn" onclick="window.location.href='/post-survey.html'">사후 설문 작성하기 ➔</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // 1. 로컬스토리지에서 최근 설문 데이터(preSurveyResult) 불러오기
      const raw = localStorage.getItem("preSurveyResult");
      if (!raw) {
        alert("저장된 설문 데이터가 없습니다. 처음으로 돌아갑니다.");
        window.location.href = "/";
        return;
      }

      const survey = JSON.parse(raw);

      // 2. 서버에 C1 생성 요청 보내기
      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            condition: "C1",
            payload: survey.data,
            scenarioId: survey.scenarioId
          })
        });

        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        // 로딩 숨기고 결과 영역 표시
        document.getElementById("loader-container").style.display = "none";
        document.getElementById("report-container").style.display = "block";
        document.getElementById("next-btn").style.display = "block";

        // ✅ 초이스 페이지에서 뭘 선택했는지 확인하여 경고 문구 띄우기
        const branch = localStorage.getItem("branchChoice") || "Go";
        const warningBox = document.getElementById("c1-warning-box");
        if (warningBox) {
          if (branch === "Go" || branch === "Proceed") {
            // 강행을 선택했을 때 (교수님 요청 문구)
            warningBox.innerHTML = "⚠️ 당신이 해당 위험상황을 인지했음에도 불구하고<br><span style='color: #d32f2f;'>작업을 강행했을 때 발생할 수 있는 사고 사례</span>에 대한 정보입니다.";
            warningBox.style.backgroundColor = "#fff3cd"; // 노란색 경고 배경
            warningBox.style.color = "#856404";
            warningBox.style.border = "1px solid #ffeeba";
            warningBox.style.display = "block";
          } else {
            // 멈춤을 선택했을 때 (안도감을 주는 문구 추가)
            warningBox.innerHTML = "✅ 당신은 작업을 멈추어 안전을 지켜냈습니다.<br>하지만 만약 <span style='color: #d32f2f;'>무시하고 강행했다면</span> 아래와 같은 사고가 발생할 수 있었습니다.";
            warningBox.style.backgroundColor = "#d4edda"; // 초록색 안도 배경
            warningBox.style.color = "#155724";
            warningBox.style.border = "1px solid #c3e6cb";
            warningBox.style.display = "block";
          }
        }

        // ✅ 1. ===안전수칙=== 을 기준으로 텍스트 쪼개기
        const parts = data.text.split("===안전수칙===");
        const reportPart = parts[0].trim().replace(/\n/g, "<br>");
        
        // 상단 보고서 삽입
        document.getElementById("report-text").innerHTML = reportPart;

        // ✅ 2. 이미지 삽입
        if (data.imagePath) {
          const img = document.createElement("img");
          img.src = encodeURI(data.imagePath); 
          img.className = "report-image";
          img.alt = "사고 현장 참고 이미지";
          img.onerror = function() { this.style.display = "none"; };
          document.getElementById("image-wrapper").appendChild(img);
        }

        // ✅ 3. 이미지 아래에 안전수칙 삽입
        if (parts.length > 1) {
          const rulesPart = parts[1].trim().replace(/\n/g, "<br>");
          const rulesDiv = document.createElement("div");
          rulesDiv.className = "rules-box";
          rulesDiv.innerHTML = "<h3>🛡️ 예방을 위한 3대 안전수칙</h3>" + rulesPart;
          document.getElementById("rules-container").appendChild(rulesDiv);
        }

      } catch (e) {
        console.error(e);
        document.getElementById("loader-container").innerHTML = "<span style='color:red;'>⚠️ 리포트 생성 중 오류가 발생했습니다.</span>";
      }
    });
  </script>
</body>
</html>
