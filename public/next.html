<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조건 선택</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 900px; color: #333; background-color: #f9f9f9; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin: 16px 0; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .muted { color: #666; font-size: 14px; line-height: 1.5; margin-top: 4px;}
    
    h3 { margin-top: 0; }
    
    /* 선택지 스타일 */
    .choices { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .choice {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px; border: 1px solid #eee; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .choice:hover { background-color: #f8f9fa; border-color: #ccedff; }
    .choice input { margin-top: 4px; transform: scale(1.2); }
    
    /* 버튼 스타일 */
    .btn-row { margin-top: 24px; text-align: right; }
    button { 
      padding: 14px 24px; border-radius: 8px; border: none; 
      background: #007bff; color: #fff; font-size: 1rem; font-weight: bold;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #0056b3; }
    
    /* 상단 정보 표시 */
    .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .pill { background: #e9ecef; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; color: #495057; }
  </style>
</head>
<body>

  <div class="info-bar">
    <h1>Phase 2. 실험 조건 선택</h1>
    <span class="pill" id="filePill">데이터 로딩 중...</span>
  </div>

  <div class="card">
    <h3>진행할 조건을 선택하세요</h3>
    <p style="color: #666; font-size: 0.95rem;">
      실험 설계에 따라 참가자가 경험할 시나리오 유형을 선택합니다.
    </p>

    <div class="choices">
      <label class="choice">
        <input type="radio" name="cond" value="C1" />
        <div>
          <b>C1 — 사고 사례 (단순 정보)</b>
          <div class="muted">
            생성된 사고 사례 텍스트를 읽습니다. 별도의 선택이나 상호작용이 없습니다.
          </div>
        </div>
      </label>

      <label class="choice">
        <input type="radio" name="cond" value="C2" />
        <div>
          <b>C2 — 미래의 편지 (선택형)</b>
          <div class="muted">
            위험 상황에서 [멈춤 vs 강행]을 선택하고, 그 결과에 따른 <b>미래의 편지</b>를 받습니다.
          </div>
        </div>
      </label>

      <label class="choice">
        <input type="radio" name="cond" value="C3" />
        <div>
          <b>C3 — 미래와의 대화 (채팅형)</b>
          <div class="muted">
            위험 상황에서 [멈춤 vs 강행]을 선택하고, <b>미래의 나와 채팅</b>을 나누며 설득 과정을 경험합니다.
          </div>
        </div>
      </label>
    </div>

    <div class="btn-row">
      <button onclick="handleStart()">선택 완료 및 시작하기 &rarr;</button>
    </div>
  </div>

<script>
  // 1. 페이지 로드 시: 저장된 설문 데이터 확인
  const raw = localStorage.getItem("surveyResult") || localStorage.getItem("preSurveyResult");
  
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      document.getElementById("filePill").textContent = "파일: " + (parsed.savedAs || "Unknown");
      console.log("Loaded Data:", parsed);
    } catch (e) {
      console.error("JSON 파싱 에러:", e);
      document.getElementById("filePill").textContent = "데이터 손상됨";
    }
  } else {
    document.getElementById("filePill").textContent = "데이터 없음";
    alert("이전 단계의 설문 데이터가 없습니다.\n첫 화면으로 이동합니다.");
    window.location.href = "/";
  }

  // 2. 시작하기 버튼 클릭 핸들러 (수정된 핵심 로직)
  function handleStart() {
    // 선택된 라디오 버튼 값 가져오기
    const selected = document.querySelector('input[name="cond"]:checked');
    
    if (!selected) {
      alert("진행할 조건(C1, C2, C3)을 선택해주세요.");
      return;
    }

    const condition = selected.value;

    // ★ 중요: 선택한 조건을 로컬스토리지에 저장 (이후 단계에서 확인용)
    localStorage.setItem("selectedCondition", condition);
    console.log("Condition Selected:", condition);

    // ★ 페이지 이동 로직 수정됨
    if (condition === "C1") {
      // C1은 선택 단계(Stop/Go)가 필요 없으므로 바로 결과 페이지(C1)로 이동
      window.location.href = "c1.html"; 
    } else {
      // C2(편지)와 C3(채팅)는 모두 '행동 선택'이 필요하므로 choice.html로 이동
      // choice.html에서 Stop/Go를 고른 후 -> 저장된 조건(C2 or C3)에 따라 갈림
      window.location.href = "choice.html"; 
    }
  }
</script>

</body>
</html>
