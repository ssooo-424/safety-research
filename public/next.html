<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>조건 선택</title>
  <style>
    body {
      margin: 0; padding: 0; background-color: #e9ecef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex; justify-content: center;
    }
    .mobile-frame {
      width: 100%; max-width: 900px; background: #f2f4f7;
      min-height: 100vh; display: flex; flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    header {
      background: #fff; padding: 20px 24px; text-align: center;
      border-bottom: 1px solid #ddd; flex-shrink: 0; z-index: 10;
    }
    header h1 { margin: 0; font-size: 1.3rem; color: #333; }
    header .pill {
      display: inline-block; margin-top: 8px;
      background: #e9ecef; padding: 4px 14px; border-radius: 20px;
      font-size: 0.82rem; color: #495057;
    }

    .content { padding: 24px; flex: 1; }

    .card {
      background: #fff; border-radius: 12px; padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee;
    }
    .card h3 { margin-top: 0; font-size: 1.15rem; color: #1a1a1a; }
    .card p { color: #666; font-size: 0.95rem; line-height: 1.5; }

    .choices { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .choice {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 18px; border: 2px solid #eee; border-radius: 12px;
      cursor: pointer; transition: all 0.2s; background: #f8f9fa;
    }
    .choice:hover { background: #fff; border-color: #b0d4f1; }
    .choice.selected { background: #fff; border-color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .choice input { margin-top: 4px; transform: scale(1.3); accent-color: #333; }
    .choice b { font-size: 1.05rem; color: #222; }
    .choice .muted { color: #666; font-size: 0.88rem; line-height: 1.5; margin-top: 4px; }

    footer {
      padding: 20px 24px; background: #fff; border-top: 1px solid #ddd;
    }
    .submit-btn {
      width: 100%; background: #333; color: #fff; border: none;
      padding: 18px; border-radius: 12px; font-size: 1.1rem;
      font-weight: bold; cursor: pointer; transition: background 0.2s;
    }
    .submit-btn:hover { background: #555; }
  </style>
</head>
<body>

  <div class="mobile-frame">
    <header>
      <h1>Phase 2. 실험 조건 선택</h1>
      <span class="pill" id="filePill">데이터 로딩 중...</span>
    </header>

    <div class="content">
      <div class="card">
        <h3>진행할 조건을 선택하세요</h3>
        <p>실험 설계에 따라 참가자가 경험할 시나리오 유형을 선택합니다.</p>

        <div class="choices">
          <label class="choice" id="choice-c1">
            <input type="radio" name="cond" value="C1" />
            <div>
              <b>C1 — 사고 사례 (단순 정보)</b>
              <div class="muted">생성된 사고 사례 텍스트를 읽습니다. 별도의 선택이나 상호작용이 없습니다.</div>
            </div>
          </label>

          <label class="choice" id="choice-c2">
            <input type="radio" name="cond" value="C2" />
            <div>
              <b>C2 — 미래의 편지 (선택형)</b>
              <div class="muted">위험 상황에서 [멈춤 vs 강행]을 선택하고, 그 결과에 따른 <b>미래의 편지</b>를 받습니다.</div>
            </div>
          </label>

          <label class="choice" id="choice-c3">
            <input type="radio" name="cond" value="C3" />
            <div>
              <b>C3 — 미래와의 대화 (채팅형)</b>
              <div class="muted">위험 상황에서 [멈춤 vs 강행]을 선택하고, <b>미래의 나와 채팅</b>을 나누며 설득 과정을 경험합니다.</div>
            </div>
          </label>
        </div>
      </div>
    </div>

    <footer>
      <button class="submit-btn" onclick="handleStart()">선택 완료 및 시작하기 →</button>
    </footer>
  </div>

<script>
  // 선택 시 하이라이트
  document.querySelectorAll('.choice').forEach(label => {
    label.querySelector('input').addEventListener('change', () => {
      document.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
      label.classList.add('selected');
    });
  });

  // 저장된 설문 데이터 확인
  const raw = localStorage.getItem("surveyResult") || localStorage.getItem("preSurveyResult");
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      document.getElementById("filePill").textContent = "파일: " + (parsed.savedAs || "Unknown");
    } catch (e) {
      document.getElementById("filePill").textContent = "데이터 손상됨";
    }
  } else {
    document.getElementById("filePill").textContent = "데이터 없음";
    alert("이전 단계의 설문 데이터가 없습니다.\n첫 화면으로 이동합니다.");
    window.location.href = "/";
  }

  function handleStart() {
    const selected = document.querySelector('input[name="cond"]:checked');
    if (!selected) { alert("진행할 조건(C1, C2, C3)을 선택해주세요."); return; }
    const condition = selected.value;
    localStorage.setItem("selectedCondition", condition);
    window.location.href = "choice.html";
  }
</script>

</body>
</html>
